---
layout: page
title: hyperblog
permalink: /hyperblog-posts
---

<ul>
  {% for post in site.categories.hyperblog %}
    <li>
      <a href="{{ post.url }}">{{ post.title }} </a> 
      <div class="tag-list">
        {% for tag in post.tags %}
        #tag 
        {% endfor %}
      </div>
      <div class="post-excerpt">
        {{ post.excerpt }}
      </div>
    </li>
  {% endfor %}
</ul>
