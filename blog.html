A more regular blog. 

<ul class="blog-list">
  {% for post in site.categories.blog %}
    <li class="blog-listing">

      <a href="{{ post.url }}" class="blog-listing-post-link"><h3>{{ post.title }} ({{ post.date | date_to_string}})</h3></a>

      <div class="tag-list">
        {% for tag in post.tags %}
        <i>#{{ tag }} </i>
        {% endfor %}
      </div>

    </li>
  {% endfor %}
</ul>
